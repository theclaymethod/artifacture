<!DOCTYPE html>
<!-- violates: deck-navigation-shell-safe-controls | Deck shell targets are undersized and chapters are vertically centered. -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deck navigation shell controls</title>
<style>
:root { --font-body: "IBM Plex Sans", sans-serif; --font-mono: "IBM Plex Mono", monospace; --min-font-size: 16px; }
* { box-sizing: border-box; }
html, body { margin: 0; overflow: hidden; font-family: var(--font-body); }
.deck { height: 100dvh; overflow-y: auto; scroll-snap-type: y mandatory; }
.slide { height: 100dvh; overflow: hidden; scroll-snap-align: start; padding: 96px 120px; }
.rail { position: fixed; z-index: 100; inset: 0 auto 0 0; width: 44px; background: #201f1e; color: #fef9ef; }
.rail-brand { width: 20px; height: 20px; padding: 0; }
.rail-dots { margin-top: 400px; }
.rail-dot { width: 20px; height: 20px; padding: 0; }
.pager { position: fixed; z-index: 100; right: 16px; bottom: 16px; }
.pager button { width: 30px; height: 30px; padding: 0; }
</style>
</head>
<body>
<main class="deck">
  <section class="slide"><h1>Opening claim</h1></section>
</main>
<nav class="rail" aria-label="Slides" data-rail data-rail-expanded="false">
  <button class="rail-brand" aria-label="Open slide navigation">F</button>
  <div class="rail-dots"><button class="rail-dot" aria-label="Go to chapter 1">1</button></div>
</nav>
<div class="pager"><button aria-label="Previous slide">←</button><button aria-label="Next slide">→</button></div>
</body>
</html>
